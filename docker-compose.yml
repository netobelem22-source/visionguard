services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    restart: unless-stopped
    volumes:
      - ai_model_cache:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /data
      GFPGAN_DIR: /data/gfpgan
      GFPGAN_WEIGHTS_DIR: /weights
      AI_SERVICE_URL: http://ai:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_PASS: ${GMAIL_PASS}
      FILA_CONCURRENCIA: ${FILA_CONCURRENCIA:-2}
      FACE_POOL_SIZE: ${FACE_POOL_SIZE:-2}
    volumes:
      - web_data:/data
      - face_models:/app/models:ro
      - gfpgan_weights:/weights:ro

volumes:
  pgdata:
  web_data:
  face_models:
  gfpgan_weights:
  ai_model_cache:
